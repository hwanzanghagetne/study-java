<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 상세</title>
    <link rel="stylesheet" href="css/post-detail.css">
</head>
<body>
<div class="post-box">
    <a href="board.html" class="back-link">← 목록으로</a>
    <h1 id="title"></h1>
    <p class="post-meta" id="meta"></p>
    <hr>
    <p id="content"></p>
    <div id="authorActions" class="author-actions" style="display: none;">
        <a id="editLink" href="#" class="edit-link">수정</a>
        <button id="deleteBtn" class="delete-btn">삭제</button>
    </div>
    <p id="message"></p>

    <hr>
    <div class="comment-section">
        <h2>댓글</h2>
        <ul id="commentList"></ul>
        <form id="commentForm">
            <textarea id="commentContent" placeholder="댓글을 입력하세요" rows="3" required></textarea>
            <button type="submit">댓글 작성</button>
        </form>
        <p id="commentMessage"></p>
    </div>
</div>
<script src="js/post-detail.js"></script>
</body>
</html>
