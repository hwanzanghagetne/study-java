spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  application:
    name: board
  datasource:
    url: jdbc:mysql://localhost:3306/board
    username: root
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
file:
    upload-dir: ./uploads
